name: "🐛 버그 (Bug)"
description: "잘못된 동작·오류 보고"
title: "[fix] "
labels:
  - fix
body:
  - type: textarea
    id: description
    attributes:
      label: "📋 문제 설명"
      description: "무엇이 잘못되었는지, 어떤 증상인지 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "🔁 재현 방법"
      description: "단계별로 재현할 수 있게 적어 주세요. 환경(브라우저·OS)이 중요하면 함께 적어 주세요."
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ 기대 결과"
      description: "정상이라면 어떻게 동작해야 하는지 적어 주세요."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ 실제 결과"
      description: "지금은 어떻게 동작하는지 적어 주세요. 에러 메시지가 있으면 그대로 붙여 주세요."
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "💡 원인 추정 또는 참고사항"
      description: "의심되는 원인, 관련 이슈·PR, 스크린샷 링크 등이 있으면 적어 주세요. 모르겠으면 비워 두셔도 됩니다."
    validations:
      required: false
